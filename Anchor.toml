[features]
seeds = false
skip-lint = false

[programs.localnet]
step_exploit = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "mkdir -p target/idl target/types && PROG_ID=$(grep step_exploit Anchor.toml | head -1 | awk -F'\"' '{print $2}') && sed \"s/Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS/$PROG_ID/g\" idl/step_exploit.json > target/idl/step_exploit.json && sed \"s/Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS/$PROG_ID/g\" idl/step_exploit.ts > target/types/step_exploit.ts && npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
